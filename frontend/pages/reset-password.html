<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — System Dash</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .auth-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 420px;
      }

      .auth-card h1 {
        margin: 0 0 0.25rem;
        font-size: 1.6rem;
        color: #0f766e;
      }

      .auth-card p.subtitle {
        margin: 0 0 1.75rem;
        color: #6b7280;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .form-group {
        margin-bottom: 1.1rem;
      }

      .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.35rem;
        color: #374151;
      }

      .form-group input {
        width: 100%;
        padding: 0.65rem 0.85rem;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.95rem;
        transition: border-color 0.2s;
        outline: none;
        background: #f9fafb;
      }

      .form-group input:focus {
        border-color: #0f766e;
        background: #fff;
      }

      .btn-primary {
        width: 100%;
        padding: 0.75rem;
        background: #0f766e;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 0.5rem;
      }

      .btn-primary:hover {
        background: #0d6460;
      }

      .btn-primary:disabled {
        background: #6b7280;
        cursor: not-allowed;
      }

      .alert {
        padding: 0.7rem 1rem;
        border-radius: 8px;
        font-size: 0.88rem;
        margin-bottom: 1rem;
        display: none;
      }

      .alert.error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #b91c1c;
      }

      .alert.success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #15803d;
      }

      /* Step indicators */
      .steps {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.75rem;
      }

      .step {
        flex: 1;
        height: 4px;
        border-radius: 4px;
        background: #e5e7eb;
        transition: background 0.3s;
      }

      .step.active {
        background: #0f766e;
      }

      /* Token field hint */
      .hint {
        font-size: 0.78rem;
        color: #9ca3af;
        margin-top: 0.25rem;
      }

      .links {
        margin-top: 1.25rem;
        font-size: 0.88rem;
        text-align: center;
        color: #6b7280;
      }

      .links a {
        color: #0f766e;
        text-decoration: none;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }

      /* Hide steps by default */
      #step-verify,
      #step-reset {
        display: none;
      }

      #step-verify.active,
      #step-reset.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h1>Reset password</h1>
      <p class="subtitle" id="subtitle-text">
        Enter your email and we'll issue a reset token.
      </p>

      <!-- Step progress bar -->
      <div class="steps">
        <div class="step active" id="bar-1"></div>
        <div class="step" id="bar-2"></div>
      </div>

      <div class="alert error" id="error-msg"></div>
      <div class="alert success" id="success-msg"></div>

      <!-- Step 1: verify email -->
      <div id="step-verify" class="active">
        <form id="verify-form" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
          <button type="submit" class="btn-primary" id="verify-btn">Send reset token</button>
        </form>
      </div>

      <!-- Step 2: enter token + new password -->
      <div id="step-reset">
        <form id="reset-form" novalidate>
          <div class="form-group">
            <label for="token">Reset token</label>
            <input
              type="text"
              id="token"
              name="token"
              placeholder="Paste your reset token"
              autocomplete="off"
              required
            />
            <p class="hint">Check your email (or use the token shown during development).</p>
          </div>

          <div class="form-group">
            <label for="new_password">New password</label>
            <input
              type="password"
              id="new_password"
              name="new_password"
              placeholder="••••••••"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirm_new_password">Confirm new password</label>
            <input
              type="password"
              id="confirm_new_password"
              name="confirm_new_password"
              placeholder="••••••••"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="submit" class="btn-primary" id="reset-btn">Reset password</button>
        </form>
      </div>

      <div class="links">
        <a href="login.html">Back to sign in</a>
      </div>
    </div>

    <script>
      const errorMsg    = document.getElementById('error-msg');
      const successMsg  = document.getElementById('success-msg');
      const subtitleEl  = document.getElementById('subtitle-text');

      let verifiedEmail = '';

      function showAlert(type, message) {
        errorMsg.style.display   = 'none';
        successMsg.style.display = 'none';
        if (type === 'error') {
          errorMsg.textContent   = message;
          errorMsg.style.display = 'block';
        } else {
          successMsg.textContent   = message;
          successMsg.style.display = 'block';
        }
      }

      function goToStep2() {
        document.getElementById('step-verify').classList.remove('active');
        document.getElementById('step-reset').classList.add('active');
        document.getElementById('bar-2').classList.add('active');
        subtitleEl.textContent = 'Enter the token and choose a new password.';
        errorMsg.style.display   = 'none';
        successMsg.style.display = 'none';
      }

      // Step 1
      document.getElementById('verify-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email     = document.getElementById('email').value.trim();
        const verifyBtn = document.getElementById('verify-btn');

        if (!email) {
          showAlert('error', 'Please enter your email address.');
          return;
        }

        verifyBtn.disabled    = true;
        verifyBtn.textContent = 'Checking…';

        const body = new FormData();
        body.append('action', 'verify');
        body.append('email', email);

        try {
          const res  = await fetch('../../backend/reset_password.php', { method: 'POST', body, credentials: 'include' });
          const data = await res.json();

          if (data.success) {
            verifiedEmail = email;

            // In production the token is emailed; show it here for dev/testing
            if (data.data && data.data.token) {
              showAlert('success', 'Token issued (dev only): ' + data.data.token);
            } else {
              showAlert('success', data.message);
            }

            setTimeout(goToStep2, 1800);
          } else {
            showAlert('error', data.message);
          }
        } catch {
          showAlert('error', 'Network error. Please try again.');
        } finally {
          verifyBtn.disabled    = false;
          verifyBtn.textContent = 'Send reset token';
        }
      });

      // Step 2
      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const token            = document.getElementById('token').value.trim();
        const new_password     = document.getElementById('new_password').value;
        const confirm_password = document.getElementById('confirm_new_password').value;
        const resetBtn         = document.getElementById('reset-btn');

        if (!token || !new_password || !confirm_password) {
          showAlert('error', 'Please fill in all fields.');
          return;
        }

        if (new_password.length < 8) {
          showAlert('error', 'Password must be at least 8 characters.');
          return;
        }

        if (new_password !== confirm_password) {
          showAlert('error', 'Passwords do not match.');
          return;
        }

        resetBtn.disabled    = true;
        resetBtn.textContent = 'Resetting…';

        const body = new FormData();
        body.append('action', 'reset');
        body.append('email', verifiedEmail);
        body.append('token', token);
        body.append('new_password', new_password);

        try {
          const res  = await fetch('../../backend/reset_password.php', { method: 'POST', body, credentials: 'include' });
          const data = await res.json();

          if (data.success) {
            showAlert('success', data.message + ' Redirecting to sign in…');
            setTimeout(() => { window.location.href = 'login.html'; }, 1800);
          } else {
            showAlert('error', data.message);
          }
        } catch {
          showAlert('error', 'Network error. Please try again.');
        } finally {
          resetBtn.disabled    = false;
          resetBtn.textContent = 'Reset password';
        }
      });
    </script>
  </body>
</html>
