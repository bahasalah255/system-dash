<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — System Dash</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .auth-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 420px;
      }

      .auth-card h1 {
        margin: 0 0 0.25rem;
        font-size: 1.6rem;
        color: #0f766e;
      }

      .auth-card p.subtitle {
        margin: 0 0 1.75rem;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .form-group {
        margin-bottom: 1.1rem;
      }

      .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.35rem;
        color: #374151;
      }

      .form-group input {
        width: 100%;
        padding: 0.65rem 0.85rem;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.95rem;
        transition: border-color 0.2s;
        outline: none;
        background: #f9fafb;
      }

      .form-group input:focus {
        border-color: #0f766e;
        background: #fff;
      }

      .btn-primary {
        width: 100%;
        padding: 0.75rem;
        background: #0f766e;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 0.5rem;
      }

      .btn-primary:hover {
        background: #0d6460;
      }

      .btn-primary:disabled {
        background: #6b7280;
        cursor: not-allowed;
      }

      .alert {
        padding: 0.7rem 1rem;
        border-radius: 8px;
        font-size: 0.88rem;
        margin-bottom: 1rem;
        display: none;
      }

      .alert.error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #b91c1c;
      }

      .alert.success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #15803d;
      }

      .links {
        margin-top: 1.25rem;
        font-size: 0.88rem;
        text-align: center;
        color: #6b7280;
      }

      .links a {
        color: #0f766e;
        text-decoration: none;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }

      .divider {
        margin: 0 0.5rem;
        color: #d1d5db;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your System Dash account</p>

      <div class="alert error" id="error-msg"></div>
      <div class="alert success" id="success-msg"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Sign in</button>
      </form>

      <div class="links">
        <a href="reset-password.html">Forgot password?</a>
        <span class="divider">|</span>
        <a href="register.html">Create an account</a>
      </div>
    </div>

    <script>
      const form       = document.getElementById('login-form');
      const submitBtn  = document.getElementById('submit-btn');
      const errorMsg   = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      const loginEndpoint = new URL('../../backend/login.php', window.location.href).href;

      function showAlert(type, message) {
        errorMsg.style.display   = 'none';
        successMsg.style.display = 'none';
        if (type === 'error') {
          errorMsg.textContent   = message;
          errorMsg.style.display = 'block';
        } else {
          successMsg.textContent   = message;
          successMsg.style.display = 'block';
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (window.location.protocol === 'file:') {
          showAlert(
            'error',
            'Open this page through http://localhost or Apache/XAMPP/WAMP. Browsers block file:// pages from calling the PHP backend directly.'
          );
          return;
        }

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          showAlert('error', 'Please fill in all fields.');
          return;
        }

        submitBtn.disabled   = true;
        submitBtn.textContent = 'Signing in…';

        const body = new FormData();
        body.append('email', email);
        body.append('password', password);

        try {
          const res  = await fetch(loginEndpoint, { method: 'POST', body, credentials: 'include' });
          const data = await res.json();

          if (data.success) {
            showAlert('success', data.message);
            const role = data.data && data.data.role;
            const dest = role === 'manager' ? 'dashboard-manager.html' : 'dashboard-student.html';
            setTimeout(() => {
              window.location.href = dest;
            }, 800);
          } else {
            showAlert('error', data.message);
          }
        } catch {
          showAlert('error', 'Network error. Please try again.');
        } finally {
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Sign in';
        }
      });
    </script>
  </body>
</html>
