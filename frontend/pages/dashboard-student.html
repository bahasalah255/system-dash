<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
      /* ============================================================
         TOKENS  — identical to manager dashboard
      ============================================================ */
      :root {
        --color-bg:            #f5f5f4;
        --color-surface:       #ffffff;
        --color-border:        rgba(0, 0, 0, 0.08);
        --color-border-strong: rgba(0, 0, 0, 0.14);
        --color-text:          #1a1a1a;
        --color-text-muted:    #6b7280;
        --color-text-hint:     #9ca3af;
        --color-accent:        #0f766e;
        --color-accent-light:  #f0fdfa;
        --color-red:           #b91c1c;
        --sidebar-w:           200px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: var(--color-text);
        background: var(--color-bg);
        display: flex;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* ============================================================
         SIDEBAR
      ============================================================ */
      .sidebar {
        width: var(--sidebar-w);
        background: var(--color-surface);
        border-right: 0.5px solid var(--color-border-strong);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        z-index: 20;
      }

      .sidebar-brand {
        padding: 16px 14px;
        border-bottom: 0.5px solid var(--color-border);
      }

      .brand-name {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--color-text);
        letter-spacing: -0.1px;
      }

      .brand-sub {
        display: block;
        font-size: 11.5px;
        color: var(--color-text-hint);
        margin-top: 1px;
      }

      .sidebar-nav {
        flex: 1;
        padding: 10px 0;
        overflow-y: auto;
      }

      .nav-group-label {
        font-size: 10px;
        font-weight: 400;
        color: var(--color-text-hint);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 8px 14px 4px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 9px;
        height: 36px;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 400;
        color: var(--color-text-muted);
        border-left: 2px solid transparent;
        cursor: pointer;
        user-select: none;
        text-decoration: none;
        transition: color 0.1s, background 0.1s;
      }

      .nav-item i {
        font-size: 16px;
        flex-shrink: 0;
        opacity: 0.6;
        transition: opacity 0.1s;
      }

      .nav-item:hover { color: var(--color-text); background: var(--color-bg); }
      .nav-item:hover i { opacity: 1; }

      .nav-item.active {
        border-left-color: var(--color-accent);
        background: var(--color-accent-light);
        color: var(--color-accent);
        font-weight: 500;
      }

      .nav-item.active i { opacity: 1; }

      .sidebar-bottom {
        padding: 10px 8px 14px;
        border-top: 0.5px solid var(--color-border);
      }

      .sidebar-user-row {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 6px 14px 10px;
      }

      .user-avatar {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--color-accent);
        color: #fff;
        font-size: 11px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        text-transform: uppercase;
      }

      .sidebar-username {
        display: block;
        font-size: 12.5px;
        color: var(--color-text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .btn-signout {
        display: flex;
        align-items: center;
        gap: 7px;
        width: 100%;
        padding: 7px 12px;
        background: transparent;
        border: 0.5px solid var(--color-border-strong);
        border-radius: 5px;
        font-size: 13px;
        font-weight: 400;
        color: var(--color-text-muted);
        cursor: pointer;
        font-family: inherit;
        text-align: left;
        transition: background 0.1s, color 0.1s;
      }

      .btn-signout i { font-size: 15px; }
      .btn-signout:hover { background: var(--color-border); color: var(--color-text); }

      /* ============================================================
         MAIN LAYOUT
      ============================================================ */
      .main {
        margin-left: var(--sidebar-w);
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .topbar {
        background: var(--color-surface);
        border-bottom: 0.5px solid var(--color-border-strong);
        height: 52px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .topbar-title {
        font-size: 15px;
        font-weight: 500;
        color: var(--color-text);
        letter-spacing: -0.1px;
      }

      .topbar-date {
        font-size: 13px;
        color: var(--color-text-hint);
      }

      .content { padding: 24px; flex: 1; }

      /* ============================================================
         SECTIONS
      ============================================================ */
      .section { display: none; }
      .section.active { display: block; }

      /* ============================================================
         SECTION HEADINGS
      ============================================================ */
      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 16px;
      }

      .section-title { font-size: 13px; font-weight: 500; color: var(--color-text); }

      /* ============================================================
         SEARCH BAR
      ============================================================ */
      .search-wrap { position: relative; flex-shrink: 0; }

      .search-wrap i {
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-text-hint);
        font-size: 14px;
        pointer-events: none;
      }

      .search-wrap input {
        padding: 5px 10px 5px 30px;
        border: 0.5px solid var(--color-border-strong);
        border-radius: 6px;
        font-size: 12.5px;
        font-family: inherit;
        outline: none;
        background: var(--color-surface);
        color: var(--color-text);
        width: 190px;
        transition: border-color 0.15s, width 0.2s;
      }

      .search-wrap input:focus { border-color: var(--color-accent); width: 230px; }
      .search-wrap input::placeholder { color: var(--color-text-hint); }

      /* ============================================================
         EVENTS — card list
      ============================================================ */
      .events-list {
        display: flex;
        flex-direction: column;
        gap: 1px;
        background: var(--color-border);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        overflow: hidden;
      }

      .event-item {
        background: var(--color-surface);
        display: flex;
        align-items: flex-start;
        gap: 20px;
        padding: 18px 22px;
        transition: background 0.1s;
      }

      .event-item:hover { background: #fafaf9; }

      .event-date-block {
        flex-shrink: 0;
        width: 42px;
        text-align: center;
        padding-top: 2px;
      }

      .event-day {
        display: block;
        font-size: 22px;
        font-weight: 500;
        color: var(--color-text);
        line-height: 1;
        letter-spacing: -1px;
      }

      .event-month {
        display: block;
        font-size: 10px;
        font-weight: 400;
        color: var(--color-text-hint);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-top: 3px;
      }

      .event-divider {
        width: 0.5px;
        align-self: stretch;
        background: var(--color-border-strong);
        flex-shrink: 0;
      }

      .event-body { flex: 1; min-width: 0; }

      .event-title {
        font-size: 13.5px;
        font-weight: 500;
        color: var(--color-text);
        line-height: 1.4;
      }

      .event-meta { margin-top: 4px; }

      .event-location {
        font-size: 12px;
        color: var(--color-text-hint);
      }

      .event-desc {
        font-size: 12.5px;
        color: var(--color-text-muted);
        margin-top: 6px;
        line-height: 1.55;
      }

      .events-empty {
        background: var(--color-surface);
        text-align: center;
        padding: 56px 24px;
        color: var(--color-text-hint);
        font-size: 13px;
        border-radius: 8px;
        border: 1px solid var(--color-border);
      }

      .events-empty strong {
        display: block;
        font-size: 13.5px;
        font-weight: 500;
        color: var(--color-text-muted);
        margin-bottom: 4px;
      }

      /* ============================================================
         PROFILE
      ============================================================ */
      .profile-info-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 16px;
      }

      .profile-info-header {
        padding: 11px 16px;
        border-bottom: 0.5px solid var(--color-border);
        background: #fafaf9;
      }

      .profile-info-header span {
        font-size: 12px;
        font-weight: 400;
        color: var(--color-text-hint);
      }

      .account-card-top {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px;
        border-bottom: 0.5px solid var(--color-border);
      }

      .account-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--color-accent);
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .account-info-name {
        font-size: 13.5px;
        font-weight: 500;
        color: var(--color-text);
      }

      .account-info-sub {
        font-size: 12px;
        color: var(--color-text-hint);
        margin-top: 1px;
      }

      .account-rows { padding: 0; }

      .account-row {
        display: flex;
        align-items: center;
        padding: 11px 16px;
        border-bottom: 0.5px solid var(--color-border);
        font-size: 13.5px;
      }

      .account-row:last-child { border-bottom: none; }

      .account-key {
        width: 120px;
        flex-shrink: 0;
        font-size: 12px;
        color: var(--color-text-hint);
      }

      .account-val { font-size: 13px; color: var(--color-text); }

      .role-pill {
        display: inline-block;
        padding: 1px 9px;
        border-radius: 20px;
        font-size: 11.5px;
        font-weight: 400;
        background: var(--color-accent-light);
        border: 0.5px solid rgba(15,118,110,0.25);
        color: var(--color-accent);
        text-transform: capitalize;
      }

      /* Settings grid */
      .settings-label {
        font-size: 10px;
        font-weight: 400;
        color: var(--color-text-hint);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
        margin-top: 20px;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .settings-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        overflow: hidden;
      }

      .settings-card-header {
        padding: 11px 16px;
        border-bottom: 0.5px solid var(--color-border);
        background: #fafaf9;
      }

      .settings-card-header h4 {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text);
      }

      .settings-card-header p {
        font-size: 11.5px;
        color: var(--color-text-hint);
        margin-top: 1px;
      }

      .settings-card-body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .field { display: flex; flex-direction: column; gap: 4px; }

      .field label {
        font-size: 12px;
        font-weight: 400;
        color: var(--color-text-muted);
      }

      .field input {
        padding: 7px 10px;
        border: 0.5px solid var(--color-border-strong);
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        color: var(--color-text);
        background: var(--color-bg);
        outline: none;
        transition: border-color 0.15s, background 0.15s;
      }

      .field input:focus { border-color: var(--color-accent); background: var(--color-surface); }

      .settings-card-footer {
        padding: 11px 16px;
        border-top: 0.5px solid var(--color-border);
        background: #fafaf9;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-save {
        padding: 6px 16px;
        background: var(--color-accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 400;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.1s;
      }

      .btn-save:hover { background: #0c5f58; }

      .form-msg {
        font-size: 12px;
        display: none;
      }

      .form-msg.success { color: var(--color-accent); display: block; }
      .form-msg.error   { color: var(--color-red);    display: block; }
    </style>
  </head>
  <body>

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-name">Academic Events</span>
        <span class="brand-sub">Student portal</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group-label">Navigation</div>
        <a class="nav-item active" data-section="events">
          <i class="ti ti-calendar-event"></i>Events
        </a>
        <a class="nav-item" data-section="profile">
          <i class="ti ti-user-circle"></i>My profile
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="sidebar-user-row">
          <div class="user-avatar" id="user-avatar">?</div>
          <span class="sidebar-username" id="sidebar-user">Loading...</span>
        </div>
        <button class="btn-signout" id="logout-btn">
          <i class="ti ti-logout"></i>Sign out
        </button>
      </div>
    </aside>

    <!-- ===================== MAIN ===================== -->
    <div class="main">
      <div class="topbar">
        <span class="topbar-title" id="topbar-title">Events</span>
        <span class="topbar-date"  id="topbar-date"></span>
      </div>

      <div class="content">

        <!-- ========== EVENTS ========== -->
        <div class="section active" id="section-events">
          <div class="section-heading">
            <span class="section-title">Upcoming events</span>
            <div class="search-wrap">
              <i class="ti ti-search"></i>
              <input type="search" id="ev-search" placeholder="Search events..." />
            </div>
          </div>
          <div id="events-container">
            <div class="events-empty">
              <strong>Loading events...</strong>
            </div>
          </div>
        </div>

        <!-- ========== PROFILE ========== -->
        <div class="section" id="section-profile">
          <div class="section-heading">
            <span class="section-title">My profile</span>
          </div>

          <!-- Account info -->
          <div class="profile-info-card">
            <div class="profile-info-header"><span>Account information</span></div>
            <div class="account-card-top">
              <div class="account-avatar" id="account-avatar">?</div>
              <div>
                <div class="account-info-name" id="prof-name">-</div>
                <div class="account-info-sub" id="prof-email">-</div>
              </div>
            </div>
            <div class="account-rows">
              <div class="account-row">
                <span class="account-key">Full name</span>
                <span class="account-val" id="prof-name-row">-</span>
              </div>
              <div class="account-row">
                <span class="account-key">Email</span>
                <span class="account-val" id="prof-email-row">-</span>
              </div>
              <div class="account-row">
                <span class="account-key">Role</span>
                <span class="account-val"><span class="role-pill">Student</span></span>
              </div>
            </div>
          </div>

          <!-- Settings forms -->
          <div class="settings-label">Security settings</div>
          <div class="settings-grid">

            <!-- Change Email -->
            <div class="settings-card">
              <div class="settings-card-header">
                <h4>Email address</h4>
                <p>Update your login email.</p>
              </div>
              <form id="form-email">
                <div class="settings-card-body">
                  <div class="field">
                    <label>New email</label>
                    <input type="email" id="new-email" placeholder="new@email.com" required>
                  </div>
                  <div class="field">
                    <label>Confirm password</label>
                    <input type="password" id="email-password" placeholder="Your current password" required>
                  </div>
                </div>
                <div class="settings-card-footer">
                  <button type="submit" class="btn-save">Update email</button>
                  <span class="form-msg" id="msg-email"></span>
                </div>
              </form>
            </div>

            <!-- Change Password -->
            <div class="settings-card">
              <div class="settings-card-header">
                <h4>Password</h4>
                <p>Change your account password.</p>
              </div>
              <form id="form-password">
                <div class="settings-card-body">
                  <div class="field">
                    <label>Current password</label>
                    <input type="password" id="current-password" placeholder="Current password" required>
                  </div>
                  <div class="field">
                    <label>New password</label>
                    <input type="password" id="new-password" placeholder="Min. 8 characters" required>
                  </div>
                  <div class="field">
                    <label>Confirm new password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat new password" required>
                  </div>
                </div>
                <div class="settings-card-footer">
                  <button type="submit" class="btn-save">Update password</button>
                  <span class="form-msg" id="msg-password"></span>
                </div>
              </form>
            </div>

          </div>
        </div>

      </div>
    </div>

    <script>
      const BASE = '../../backend';
      const START_SECTION = new URLSearchParams(window.location.search).get('section') || 'events';

      async function get(path) {
        const res = await fetch(BASE + path, { credentials: 'include' });
        return res.json();
      }

      // ---- Auth check ----
      async function checkAuth() {
        try {
          const data = await get('/me.php');
          if (!data.success) { window.location.href = '../../login.php'; return null; }
          if (data.data.role === 'manager') { window.location.href = 'dashboard-manager.html'; return null; }
          return data.data;
        } catch {
          window.location.href = '../../login.php';
          return null;
        }
      }

      // ---- Navigation ----
      const titles = { events: 'Events', profile: 'My profile' };

      function showSection(name) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        document.querySelector('[data-section="' + name + '"]').classList.add('active');
        document.getElementById('topbar-title').textContent = titles[name];
      }

      document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', () => showSection(el.dataset.section));
      });

      // ---- Events search ----
      document.getElementById('ev-search').addEventListener('input', function () {
        const q = this.value.trim().toLowerCase();
        document.querySelectorAll('#events-container .event-item').forEach(item => {
          item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
      });

      // ---- Events ----
      async function loadEvents() {
        const container = document.getElementById('events-container');
        const data = await get('/events.php');

        if (!data.success || !data.data.events.length) {
          container.innerHTML = '<div class="events-empty"><strong>No events yet</strong>Check back later for upcoming events.</div>';
          return;
        }

        const today    = new Date().toISOString().slice(0, 10);
        const upcoming = data.data.events.filter(e => e.event_date >= today);

        if (!upcoming.length) {
          container.innerHTML = '<div class="events-empty"><strong>All caught up</strong>No upcoming events at the moment.</div>';
          return;
        }

        const list = document.createElement('div');
        list.className = 'events-list';

        upcoming.forEach(ev => {
          const d     = new Date(ev.event_date + 'T00:00:00');
          const day   = d.toLocaleDateString('en-GB', { day: '2-digit' });
          const month = d.toLocaleDateString('en-GB', { month: 'short' }).toUpperCase();

          const item = document.createElement('div');
          item.className = 'event-item';
          item.innerHTML = `
            <div class="event-date-block">
              <span class="event-day">${day}</span>
              <span class="event-month">${month}</span>
            </div>
            <div class="event-divider"></div>
            <div class="event-body">
              <div class="event-title">${esc(ev.title)}</div>
              <div class="event-meta">
                ${ev.location ? `<span class="event-location">${esc(ev.location)}</span>` : ''}
              </div>
              ${ev.description ? `<p class="event-desc">${esc(ev.description)}</p>` : ''}
            </div>`;
          list.appendChild(item);
        });

        container.innerHTML = '';
        container.appendChild(list);
      }

      function esc(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      // ---- Logout ----
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await fetch(BASE + '/logout.php', { credentials: 'include' });
        window.location.href = '../../login.php';
      });

      // ---- Init ----
      (async () => {
        const user = await checkAuth();
        if (!user) return;

        const initial = user.name.charAt(0).toUpperCase();
        document.getElementById('sidebar-user').textContent   = user.name;
        document.getElementById('user-avatar').textContent    = initial;
        document.getElementById('account-avatar').textContent = initial;
        document.getElementById('prof-name').textContent      = user.name;
        document.getElementById('prof-email').textContent     = user.email;
        document.getElementById('prof-name-row').textContent  = user.name;
        document.getElementById('prof-email-row').textContent = user.email;

        const now = new Date();
        document.getElementById('topbar-date').textContent =
          now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });

        showSection(START_SECTION);
        loadEvents();
      })();

      // ---- Message helper ----
      function showMsg(id, success, text) {
        const el = document.getElementById(id);
        el.className = 'form-msg ' + (success ? 'success' : 'error');
        el.textContent = text;
      }

      // ---- Change Email ----
      document.getElementById('form-email').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = new URLSearchParams({
          new_email: document.getElementById('new-email').value,
          password:  document.getElementById('email-password').value,
        });
        const res  = await fetch(BASE + '/update_email.php', { method: 'POST', credentials: 'include', body });
        const data = await res.json();
        showMsg('msg-email', data.success, data.message);
        if (data.success) {
          const newEmail = document.getElementById('new-email').value;
          document.getElementById('prof-email').textContent     = newEmail;
          document.getElementById('prof-email-row').textContent = newEmail;
          e.target.reset();
        }
      });

      // ---- Change Password ----
      document.getElementById('form-password').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPw  = document.getElementById('new-password').value;
        const confPw = document.getElementById('confirm-password').value;
        if (newPw !== confPw) { showMsg('msg-password', false, 'New passwords do not match.'); return; }
        const body = new URLSearchParams({
          current_password: document.getElementById('current-password').value,
          new_password:     newPw,
          confirm_password: confPw,
        });
        const res  = await fetch(BASE + '/update_password.php', { method: 'POST', credentials: 'include', body });
        const data = await res.json();
        showMsg('msg-password', data.success, data.message);
        if (data.success) e.target.reset();
      });
    </script>
  </body>
</html>
