<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        background: #f0f0ef;
        display: flex;
        min-height: 100vh;
      }

      /* ---- Sidebar ---- */
      .sidebar {
        width: 210px;
        background: #fff;
        border-right: 1px solid #d4d4d4;
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        z-index: 10;
      }

      .sidebar-brand {
        padding: 18px 16px 14px;
        border-bottom: 1px solid #e8e8e8;
      }

      .sidebar-brand strong {
        display: block;
        font-size: 15px;
        font-weight: 700;
        color: #0f766e;
        letter-spacing: -0.2px;
      }

      .sidebar-brand span {
        font-size: 11.5px;
        color: #888;
        margin-top: 1px;
        display: block;
      }

      .sidebar-nav {
        flex: 1;
        padding: 10px 0;
      }

      .nav-item {
        display: block;
        padding: 9px 16px;
        font-size: 13.5px;
        color: #444;
        cursor: pointer;
        border-left: 3px solid transparent;
        user-select: none;
        text-decoration: none;
      }

      .nav-item:hover { background: #f7f7f7; color: #1a1a1a; }

      .nav-item.active {
        border-left-color: #0f766e;
        background: #f0fdf9;
        color: #0f766e;
        font-weight: 600;
      }

      .sidebar-bottom {
        padding: 14px 16px;
        border-top: 1px solid #e8e8e8;
      }

      .logged-in-as {
        font-size: 12px;
        color: #888;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .btn-signout {
        width: 100%;
        padding: 7px 0;
        background: #fff;
        border: 1px solid #d4d4d4;
        border-radius: 3px;
        font-size: 13px;
        color: #444;
        cursor: pointer;
      }

      .btn-signout:hover { background: #fef2f2; border-color: #f9a8a8; color: #c0392b; }

      /* ---- Main area ---- */
      .main {
        margin-left: 210px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .topbar {
        background: #fff;
        border-bottom: 1px solid #d4d4d4;
        padding: 13px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 5;
      }

      .topbar h2 {
        font-size: 15px;
        font-weight: 600;
        color: #1a1a1a;
      }

      .topbar-right {
        font-size: 12.5px;
        color: #888;
      }

      .content {
        padding: 24px;
        flex: 1;
      }

      /* ---- Sections ---- */
      .section { display: none; }
      .section.active { display: block; }

      /* ---- Section heading ---- */
      .section-heading {
        margin-bottom: 14px;
      }

      .section-heading h3 {
        font-size: 13.5px;
        font-weight: 600;
        color: #333;
      }

      .section-heading p {
        font-size: 12.5px;
        color: #888;
        margin-top: 3px;
      }

      /* ---- Table ---- */
      .table-wrap {
        background: #fff;
        border: 1px solid #d4d4d4;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
      }

      thead th {
        background: #f7f7f7;
        padding: 9px 14px;
        text-align: left;
        font-weight: 600;
        color: #333;
        border-bottom: 1px solid #d4d4d4;
        white-space: nowrap;
      }

      tbody td {
        padding: 9px 14px;
        color: #333;
        border-bottom: 1px solid #ebebeb;
        vertical-align: middle;
      }

      tbody tr:last-child td { border-bottom: none; }
      tbody tr:hover td { background: #fafafa; }

      .empty-cell {
        text-align: center;
        color: #aaa;
        padding: 28px 14px;
        font-size: 13px;
      }

      /* ---- Event detail panel ---- */
      .event-desc {
        font-size: 12.5px;
        color: #666;
        margin-top: 2px;
      }

      /* ---- Profile card ---- */
      .profile-card {
        background: #fff;
        border: 1px solid #d4d4d4;
        padding: 24px;
        max-width: 480px;
      }

      .profile-card h4 {
        font-size: 13.5px;
        font-weight: 600;
        color: #333;
        margin-bottom: 18px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ebebeb;
      }

      .profile-row {
        display: flex;
        margin-bottom: 12px;
        font-size: 13.5px;
      }

      .profile-row .pkey {
        width: 110px;
        flex-shrink: 0;
        color: #888;
        font-size: 12.5px;
        padding-top: 1px;
      }

      .profile-row .pval {
        color: #1a1a1a;
        font-weight: 500;
      }

      .role-badge {
        display: inline-block;
        padding: 2px 8px;
        background: #f0fdf9;
        border: 1px solid #99e6d8;
        color: #0f766e;
        font-size: 12px;
        border-radius: 3px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <strong>System Dash</strong>
        <span>Student Panel</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-section="events">Events</a>
        <a class="nav-item"        data-section="profile">My Profile</a>
      </nav>
      <div class="sidebar-bottom">
        <div class="logged-in-as" id="sidebar-user">...</div>
        <button class="btn-signout" id="logout-btn">Sign out</button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <h2 id="topbar-title">Events</h2>
        <div class="topbar-right" id="topbar-date"></div>
      </div>

      <div class="content">

        <!-- Events -->
        <div class="section active" id="section-events">
          <div class="section-heading">
            <h3>Upcoming Events</h3>
            <p>All scheduled events open to students.</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Date</th>
                  <th>Location</th>
                  <th>Description</th>
                </tr>
              </thead>
              <tbody id="events-tbody">
                <tr><td class="empty-cell" colspan="4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Profile -->
        <div class="section" id="section-profile">
          <div class="section-heading">
            <h3>My Profile</h3>
          </div>
          <div class="profile-card">
            <h4>Account Information</h4>
            <div class="profile-row">
              <span class="pkey">Full name</span>
              <span class="pval" id="prof-name">-</span>
            </div>
            <div class="profile-row">
              <span class="pkey">Email</span>
              <span class="pval" id="prof-email">-</span>
            </div>
            <div class="profile-row">
              <span class="pkey">Role</span>
              <span class="pval"><span class="role-badge">Student</span></span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>
      const BASE = '../../backend';

      async function get(path) {
        const res = await fetch(BASE + path, { credentials: 'include' });
        return res.json();
      }

      function fmtDate(str) {
        if (!str) return '-';
        const d = new Date(str + 'T00:00:00');
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      }

      function td(text) {
        const el = document.createElement('td');
        el.textContent = text || '-';
        return el;
      }

      function emptyRow(cols, msg) {
        const tr = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = cols;
        cell.className = 'empty-cell';
        cell.textContent = msg;
        tr.appendChild(cell);
        return tr;
      }

      // ---- Auth check ----
      async function checkAuth() {
        try {
          const data = await get('/me.php');
          if (!data.success) {
            window.location.href = 'login.html';
            return null;
          }
          if (data.data.role === 'manager') {
            window.location.href = 'dashboard-manager.html';
            return null;
          }
          return data.data;
        } catch {
          window.location.href = 'login.html';
          return null;
        }
      }

      // ---- Navigation ----
      const titles = { events: 'Events', profile: 'My Profile' };

      function showSection(name) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        document.querySelector('[data-section="' + name + '"]').classList.add('active');
        document.getElementById('topbar-title').textContent = titles[name];
      }

      document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', () => showSection(el.dataset.section));
      });

      // ---- Events ----
      async function loadEvents() {
        const data = await get('/events.php');
        const tbody = document.getElementById('events-tbody');
        tbody.innerHTML = '';

        if (!data.success || !data.data.events.length) {
          tbody.appendChild(emptyRow(4, 'No events scheduled yet.'));
          return;
        }

        const today = new Date().toISOString().slice(0, 10);
        const upcoming = data.data.events.filter(e => e.event_date >= today);

        if (!upcoming.length) {
          tbody.appendChild(emptyRow(4, 'No upcoming events at the moment.'));
          return;
        }

        upcoming.forEach(ev => {
          const tr = document.createElement('tr');
          tr.appendChild(td(ev.title));
          tr.appendChild(td(fmtDate(ev.event_date)));
          tr.appendChild(td(ev.location));
          tr.appendChild(td(ev.description));
          tbody.appendChild(tr);
        });
      }

      // ---- Logout ----
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await fetch(BASE + '/logout.php', { credentials: 'include' });
        window.location.href = 'login.html';
      });

      // ---- Init ----
      (async () => {
        const user = await checkAuth();
        if (!user) return;

        document.getElementById('sidebar-user').textContent = user.name;
        document.getElementById('prof-name').textContent    = user.name;
        document.getElementById('prof-email').textContent   = user.email;

        const now = new Date();
        document.getElementById('topbar-date').textContent =
          now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });

        loadEvents();
      })();
    </script>
  </body>
</html>
