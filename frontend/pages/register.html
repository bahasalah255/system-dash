<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — System Dash</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .auth-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 440px;
      }

      .auth-card h1 {
        margin: 0 0 0.25rem;
        font-size: 1.6rem;
        color: #0f766e;
      }

      .auth-card p.subtitle {
        margin: 0 0 1.75rem;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .form-group {
        margin-bottom: 1.1rem;
      }

      .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.35rem;
        color: #374151;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 0.65rem 0.85rem;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.95rem;
        transition: border-color 0.2s;
        outline: none;
        background: #f9fafb;
        appearance: none;
      }

      .form-group input:focus,
      .form-group select:focus {
        border-color: #0f766e;
        background: #fff;
      }

      .select-wrapper {
        position: relative;
      }

      .select-wrapper::after {
        content: '▾';
        position: absolute;
        right: 0.85rem;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: #6b7280;
        font-size: 0.85rem;
      }

      .hint {
        font-size: 0.78rem;
        color: #9ca3af;
        margin-top: 0.25rem;
      }

      .strength-bar {
        height: 4px;
        border-radius: 4px;
        background: #e5e7eb;
        margin-top: 0.4rem;
        overflow: hidden;
      }

      .strength-fill {
        height: 100%;
        border-radius: 4px;
        width: 0;
        transition: width 0.3s, background 0.3s;
      }

      .btn-primary {
        width: 100%;
        padding: 0.75rem;
        background: #0f766e;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 0.5rem;
      }

      .btn-primary:hover {
        background: #0d6460;
      }

      .btn-primary:disabled {
        background: #6b7280;
        cursor: not-allowed;
      }

      .alert {
        padding: 0.7rem 1rem;
        border-radius: 8px;
        font-size: 0.88rem;
        margin-bottom: 1rem;
        display: none;
      }

      .alert.error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #b91c1c;
      }

      .alert.success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #15803d;
      }

      .links {
        margin-top: 1.25rem;
        font-size: 0.88rem;
        text-align: center;
        color: #6b7280;
      }

      .links a {
        color: #0f766e;
        text-decoration: none;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h1>Create account</h1>
      <p class="subtitle">Join System Dash to manage events</p>

      <div class="alert error" id="error-msg"></div>
      <div class="alert success" id="success-msg"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="full_name">Full name</label>
          <input
            type="text"
            id="full_name"
            name="full_name"
            placeholder="Jane Doe"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <p class="hint">Minimum 8 characters</p>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm password</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Create account</button>
      </form>

      <div class="links">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>

    <script>
      const form          = document.getElementById('register-form');
      const submitBtn     = document.getElementById('submit-btn');
      const errorMsg      = document.getElementById('error-msg');
      const successMsg    = document.getElementById('success-msg');
      const passwordInput = document.getElementById('password');
      const strengthFill  = document.getElementById('strength-fill');

      function showAlert(type, message) {
        errorMsg.style.display   = 'none';
        successMsg.style.display = 'none';
        if (type === 'error') {
          errorMsg.textContent   = message;
          errorMsg.style.display = 'block';
        } else {
          successMsg.textContent   = message;
          successMsg.style.display = 'block';
        }
      }

      passwordInput.addEventListener('input', () => {
        const len = passwordInput.value.length;
        let width = '0%';
        let color = '#ef4444';

        if (len >= 12) { width = '100%'; color = '#16a34a'; }
        else if (len >= 10) { width = '75%';  color = '#ca8a04'; }
        else if (len >= 8)  { width = '50%';  color = '#f97316'; }
        else if (len >= 4)  { width = '25%';  color = '#ef4444'; }

        strengthFill.style.width      = width;
        strengthFill.style.background = color;
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const full_name        = document.getElementById('full_name').value.trim();
        const email            = document.getElementById('email').value.trim();
        const password         = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;

        if (!full_name || !email || !password || !confirm_password) {
          showAlert('error', 'Please fill in all fields.');
          return;
        }

        if (password.length < 8) {
          showAlert('error', 'Password must be at least 8 characters.');
          return;
        }

        if (password !== confirm_password) {
          showAlert('error', 'Passwords do not match.');
          return;
        }

        submitBtn.disabled    = true;
        submitBtn.textContent = 'Creating account…';

        const body = new FormData();
        body.append('full_name', full_name);
        body.append('email', email);
        body.append('password', password);

        try {
          const res  = await fetch('../../backend/register.php', { method: 'POST', body, credentials: 'include' });
          const data = await res.json();

          if (data.success) {
            showAlert('success', data.message + ' Redirecting to login…');
            form.reset();
            strengthFill.style.width = '0';
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
          } else {
            showAlert('error', data.message);
          }
        } catch {
          showAlert('error', 'Network error. Please try again.');
        } finally {
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Create account';
        }
      });
    </script>
  </body>
</html>
