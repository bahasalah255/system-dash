# Apache Virtual Host — system-dash
#
# SETUP (do this once per machine):
#
# 1. Change the two paths below to where YOUR project folder is:
#      Linux/Mac : /home/yourname/system-dash   or  /var/www/html/system-dash
#      Windows   : C:/xampp/htdocs/system-dash
#
# 2. Add this line to your hosts file:
#      127.0.0.1   system-dash.local
#    Linux/Mac : /etc/hosts
#    Windows   : C:\Windows\System32\drivers\etc\hosts
#
# 3. Copy this file to Apache sites-available and enable it:
#      sudo cp system-dash.conf /etc/apache2/sites-available/system-dash.conf
#      sudo a2ensite system-dash
#      sudo systemctl reload apache2
#
# 4. Visit http://system-dash.local in your browser.

<VirtualHost *:80>
    ServerName system-dash.local
    DocumentRoot /home/salah/system-dash

    <Directory /home/salah/system-dash>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/system-dash-error.log
    CustomLog ${APACHE_LOG_DIR}/system-dash-access.log combined
</VirtualHost>
