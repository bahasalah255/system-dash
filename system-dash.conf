<VirtualHost *:80>
    ServerName system-dash.local
    DocumentRoot /home/salah/system-dash

    <Directory /home/salah/system-dash>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/system-dash-error.log
    CustomLog ${APACHE_LOG_DIR}/system-dash-access.log combined
</VirtualHost>
